name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/deluno
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  windows:
    name: Windows Velopack packages
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:web

      - name: Publish Deluno.Tray (win-x64)
        shell: pwsh
        run: |
          dotnet publish apps/windows-tray/Deluno.Tray.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version=${{ steps.version.outputs.version }} `
            -o artifacts/windows/bin

      - name: Bundle ffprobe.exe
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "$env:RUNNER_TEMP\\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
          Expand-Archive $zip -DestinationPath "$env:RUNNER_TEMP\\ffmpeg-extract"
          $probe = Get-ChildItem "$env:RUNNER_TEMP\\ffmpeg-extract" -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          if (-not $probe) { Write-Error "ffprobe.exe not found in archive"; exit 1 }
          Copy-Item $probe.FullName "artifacts/windows/bin/ffprobe.exe"

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install -g vpk --version 0.0.1298

      - name: Enforce signing configuration
        if: ${{ !startsWith(steps.version.outputs.version, '0.') }}
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}")) {
            Write-Error "WINDOWS_SIGN_CERT_BASE64 secret is required for tagged releases."
            exit 1
          }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}")) {
            Write-Error "WINDOWS_SIGN_CERT_PASSWORD secret is required for tagged releases."
            exit 1
          }

      - name: Prepare code signing certificate
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}") -or [string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}")) {
            Write-Host "Signing secrets not configured; continuing without certificate for this run."
            exit 0
          }
          $bytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}")
          $path = "$env:RUNNER_TEMP\\codesign.pfx"
          [IO.File]::WriteAllBytes($path, $bytes)
          "CERT_PATH=$path" >> $env:GITHUB_ENV

      - name: Sign tray executable
        if: ${{ env.CERT_PATH != '' }}
        shell: pwsh
        run: |
          signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f "$env:CERT_PATH" /p "${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}" artifacts/windows/bin/Deluno.exe

      - name: Download latest release assets for delta generation
        shell: pwsh
        continue-on-error: true
        run: |
          $env:PATH += ";$env:USERPROFILE\\.dotnet\\tools"
          vpk download github `
            --repoUrl https://github.com/${{ github.repository }} `
            --channel stable `
            --outputDir artifacts/windows/velopack `
            --token ${{ secrets.GITHUB_TOKEN }}

      - name: Create Velopack packages
        shell: pwsh
        run: |
          $env:PATH += ";$env:USERPROFILE\\.dotnet\\tools"
          vpk pack `
            --packId Deluno `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir artifacts/windows/bin `
            --mainExe Deluno.exe `
            --packTitle Deluno `
            --icon installer/deluno.ico `
            --channel stable `
            --runtime win-x64 `
            --outputDir artifacts/windows/velopack

      - name: Sign installer outputs
        if: ${{ env.CERT_PATH != '' }}
        shell: pwsh
        run: |
          Get-ChildItem artifacts/windows/velopack -Filter "*Setup*.exe" | ForEach-Object {
            signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f "$env:CERT_PATH" /p "${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}" $_.FullName
          }

      - name: Verify required Velopack outputs
        shell: pwsh
        run: |
          $isPreOne = "${{ steps.version.outputs.version }}".StartsWith("0.")
          $setup = Get-ChildItem artifacts/windows/velopack -Filter "*Setup*.exe" -ErrorAction SilentlyContinue
          $full = Get-ChildItem artifacts/windows/velopack -Filter "*full.nupkg" -ErrorAction SilentlyContinue
          $releaseJson = Get-ChildItem artifacts/windows/velopack -Filter "releases.*.json" -ErrorAction SilentlyContinue
          if (-not $setup) { Write-Error "Missing setup executable output."; exit 1 }
          if (-not $isPreOne) {
            if (-not $full) { Write-Error "Missing full nupkg output."; exit 1 }
            if (-not $releaseJson) { Write-Error "Missing releases.<channel>.json output."; exit 1 }
          }

      - name: Verify signatures
        if: ${{ env.CERT_PATH != '' }}
        shell: pwsh
        run: |
          $files = @("artifacts/windows/bin/Deluno.exe")
          $files += (Get-ChildItem artifacts/windows/velopack -Filter "*Setup*.exe").FullName
          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature $file
            if ($sig.Status -ne "Valid") {
              Write-Error "Invalid or missing signature on $file (status: $($sig.Status))."
              exit 1
            }
          }

      - name: Upload Velopack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-velopack
          path: |
            artifacts/windows/velopack/*.exe
            artifacts/windows/velopack/*.nupkg
            artifacts/windows/velopack/releases.*.json
            artifacts/windows/velopack/RELEASES*
          retention-days: 7

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-velopack
          path: release-assets

      - name: Validate release assets
        run: |
          PRE_ONE=false
          if [[ "${{ steps.version.outputs.version }}" == 0.* ]]; then PRE_ONE=true; fi
          ls -lah release-assets
          test -n "$(ls -1 release-assets/*Setup*.exe 2>/dev/null)" || { echo "Missing setup executable"; exit 1; }
          if [[ "$PRE_ONE" != "true" ]]; then
            test -n "$(ls -1 release-assets/*full.nupkg 2>/dev/null)" || { echo "Missing full package"; exit 1; }
            test -n "$(ls -1 release-assets/releases.*.json 2>/dev/null)" || { echo "Missing release index"; exit 1; }
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Deluno ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ startsWith(steps.version.outputs.version, '0.') || contains(steps.version.outputs.tag, '-') }}
          body: |
            ## Deluno ${{ steps.version.outputs.tag }}

            ### Windows

            Download and run the Velopack setup executable. Existing installs update in-place with delta packages.

            ### Docker

            ```bash
            docker pull ghcr.io/${{ github.repository_owner }}/deluno:${{ steps.version.outputs.tag }}
            ```

            Recreate containers after pulling.

            ### What's changed

            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.version.outputs.tag }}).
          files: |
            release-assets/*.exe
            release-assets/*.nupkg
            release-assets/releases.*.json
            release-assets/RELEASES*
