<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deluno — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0f13;
      --surface: #161720;
      --border: rgba(255,255,255,0.07);
      --text: #e8e9ef;
      --muted: #8b8fa8;
      --primary: #6366f1;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 100%;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      opacity: 0.35;
    }
    h1 {
      font-size: 1.375rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.625rem;
    }
    p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
    }
    button {
      margin-top: 1.75rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 0.65rem 1.75rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.87; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2.5" stroke-dasharray="6 4"/>
      <path d="M20 32h24M32 20v24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="14" y1="14" x2="50" y2="50" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <h1>You're offline</h1>
    <p>
      Deluno can't reach your server right now. Check your network connection or make sure the Deluno backend is running.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
